<div class="books-page">

    <div class="sidebar-container">
        <app-filters-sidebar></app-filters-sidebar>
    </div>

    <div class="content-container">

        <app-sort-bar [totalBooks]="books.length" (search)="searchBooks($event)"></app-sort-bar>

        <div class="book-grid">

            <app-book-card *ngFor="let book of books" [book]="book">
            </app-book-card>

        </div>

    </div>

</div>
